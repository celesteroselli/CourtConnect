<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="{% static 'styles.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtConnect</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body class="">
    {% if user.is_authenticated %}
    {% if top_nav %}
    <nav class="navbar bg-body-tertiary bg-dark px-2">
        <div class="row w-100">
          <div class="col-sm-9">
          <a class="navbar-brand text-light fs-4 mx-3" href="{% url 'juryapp:home' %}">CourtConnect<img src="{% static 'logov1.png' %}" width="60px" class="me-2"></a>
        </div>
          <div class="col-sm-3 d-flex justify-content-between align-items-center">
          <button type="button" class="btn btn-blue h-75" data-bs-toggle="modal" data-bs-target="#createModal">
                  Create New Jury
                </button>
          <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
              <strong>{{ request.user }}</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark text-small shadow">
              <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
            </ul>
        </div>
      </div>
        </div>
      </nav>
      {% endif %}
      {% endif %}
            {% block content %}
        
            {% endblock content %}

      <!-- Modals -->
      <!-- Button trigger modal -->
<!-- Modal -->
<div class="modal fade" id="createModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Create New Jury</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form method="post">
          {% csrf_token %}
          {{ jury_form.as_p }}
          <button class="btn btn-blue"
                  type="submit">Submit
          </button>
      </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
