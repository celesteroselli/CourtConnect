{% extends 'account_base.html' %}

{% block content %}
<h1 class="text-center pt-2">Register</h1>

<style>
    label, input {
        display: block;
    }
    span.helptext {
        display: none;
    }
</style>

<form class="py-3 w-100" method="post">
    {% csrf_token %}
    <label class="form-label">Username</label>
    {{ form.username }}
    <label class="form-label pt-2">Email Address</label>
    {{ form.email }}
    <label class="form-label pt-2">Password</label>
    {{ form.password1 }}
    <label class="form-label pt-2">Confirm Password</label>
    {{ form.password2 }}
    <button class="btn btn-blue mt-3" type="submit">Create Account</button>
</form>
<a href="{% url 'login' %}">Login instead</a>
{% endblock %}
