{% extends 'base.html' %}

{% block content %}

<div class="container pt-4">
  <div class="row row-cols-3">

{% for jury in list %}
<div class="col">
<div class="card bg-light" style="width: 18rem;">
    <a class="text-dark text-decoration-none" href="{% url 'juryapp:send_all' jury.pk %}"><div class="card-body">
      <h5 class="card-title"><strong>Jury: {{ jury.casename }}</strong></h5></a>
    </div>
    <ul class="list-group list-group-flush hover">
      <li class="list-group-item bg-light">{{ jury.judge }}</li>
      <li class="list-group-item bg-light">{{ jury.pk }}</li>
      <li class="list-group-item bg-light text-danger hover" type="button" data-bs-toggle="modal" data-bs-target="#deleteModal"><strong>Delete</strong></li>
    </ul>
  </div>
{% endfor %}
</div>
</div>

{% for jury in list %}
<!--Delete Modal-->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Create New Jury</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
          <h3>Are you sure you want to delete this jury?</h3>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <a type="button" class="btn btn-danger" href="{% url 'juryapp:delete' jury.pk %}">Delete</a>
      </div>
    </div>
  </div>
</div>
{% endfor %}
{% endblock content %}
